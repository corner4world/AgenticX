# 阿里云 ACR 生产镜像覆盖层（不改 prod.yml）
#
# 用法（与 prod.yml 叠加）：
#   docker compose --env-file /etc/agenticx/prod.env \
#     -f prod.yml -f prod.aliyun.yml --profile postgresql pull
#   docker compose --env-file /etc/agenticx/prod.env \
#     -f prod.yml -f prod.aliyun.yml --profile postgresql up -d
#
# 必填环境变量：
#   ALIYUN_ACR_PREFIX     ACR 完整仓库前缀（含 namespace），必须使用控制台提供的实际域名。
#                         企业版示例：
#                         <instance>-registry.cn-hangzhou.cr.aliyuncs.com/<namespace>
#   NGINX_IMAGE_TAG       已同步到 ACR 的不可变 nginx tag
#   REDIS_IMAGE_TAG       已同步到 ACR 的不可变 redis tag
#   POSTGRES_IMAGE_TAG    已同步到 ACR 的不可变 postgres tag
#   ENTERPRISE_IMAGE_TAG  已同步到 ACR 的不可变业务镜像 tag；禁止 latest
#
# 所有镜像必须预先同步到同一 ACR namespace，并在部署主机完成 docker login。
# 本文件只覆盖 image，编排/网络/卷以 prod.yml 为准。

services:
  nginx:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/nginx:${NGINX_IMAGE_TAG:?NGINX_IMAGE_TAG is required}

  redis:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/redis:${REDIS_IMAGE_TAG:?REDIS_IMAGE_TAG is required}

  postgres-primary:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/postgres:${POSTGRES_IMAGE_TAG:?POSTGRES_IMAGE_TAG is required}

  postgres-replica:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/postgres:${POSTGRES_IMAGE_TAG:?POSTGRES_IMAGE_TAG is required}

  gateway-a:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/enterprise-gateway:${ENTERPRISE_IMAGE_TAG:?ENTERPRISE_IMAGE_TAG is required}

  gateway-b:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/enterprise-gateway:${ENTERPRISE_IMAGE_TAG:?ENTERPRISE_IMAGE_TAG is required}

  web-portal:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/enterprise-web-portal:${ENTERPRISE_IMAGE_TAG:?ENTERPRISE_IMAGE_TAG is required}

  admin-console:
    image: ${ALIYUN_ACR_PREFIX:?ALIYUN_ACR_PREFIX is required}/enterprise-admin-console:${ENTERPRISE_IMAGE_TAG:?ENTERPRISE_IMAGE_TAG is required}
