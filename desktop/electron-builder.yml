appId: com.agenticx.desktop
productName: Near
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - assets/**/*
afterPack: scripts/verify-bundled-backend.js  # 漏打内嵌后端时直接 fail（含本地手工出包）
# 签名/公证见 electron-builder.signing.yml（CI 注入 CSC_LINK 时自动切换）
dmg:
  title: "${productName}"
  background: assets/dmg-background.png
  window:
    width: 800
    height: 480
  iconSize: 104
  iconTextSize: 14
  contents:
    - x: 190
      y: 365
      type: file
    - x: 610
      y: 365
      type: link
      path: /Applications
mac:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  identity: null
  gatekeeperAssess: false
  extraResources:
    - from: bundled-backend/${arch}
      to: backend
      filter:
        - "**/*"
win:
  artifactName: "${productName}-${version}-win-x64.${ext}"
  target:
    - nsis
  icon: assets/icon.ico
  extraResources:
    - from: bundled-backend/win-amd64
      to: backend
      filter:
        - "**/*"
linux:
  target:
    - AppImage
