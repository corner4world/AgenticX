# 签名 + 公证专用配置；CI 在注入 CSC_LINK 时使用（见 build-desktop.yml）。
appId: com.agenticx.desktop
productName: Near
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - assets/**/*
afterPack: scripts/verify-bundled-backend.js
afterSign: scripts/mac/notarize.js
dmg:
  title: "${productName}"
  background: assets/dmg-background.png
  window:
    width: 640
    height: 380
  iconSize: 86
  iconTextSize: 12
  contents:
    - x: 160
      y: 258
      type: file
    - x: 480
      y: 258
      type: link
      path: /Applications
mac:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  # 勿写 identity: null — macPackager 会整包跳过签名，主程序残留 linker-signed adhoc 导致公证失败
  # 不写 identity 时由 CSC_LINK + CSC_IDENTITY_AUTO_DISCOVERY 自动匹配 Developer ID
  type: distribution
  hardenedRuntime: true
  entitlements: scripts/mac/entitlements.mac.plist
  entitlementsInherit: scripts/mac/entitlements.mac.plist
  gatekeeperAssess: false
  # electron-builder 25 内置公证读 APPLE_APP_SPECIFIC_PASSWORD；自定义 afterSign 时须关闭，避免双轨冲突
  notarize: false
  extraResources:
    - from: bundled-backend/${arch}
      to: backend
      filter:
        - "**/*"
win:
  artifactName: "${productName}-${version}-win-x64.${ext}"
  target:
    - nsis
  icon: assets/icon.ico
  extraResources:
    - from: bundled-backend/win-amd64
      to: backend
      filter:
        - "**/*"
linux:
  target:
    - AppImage
